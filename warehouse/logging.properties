# Configuración de logging para Jason
# Universidad de Vigo - Sistemas Inteligentes

# Nivel de log general
# Opciones: OFF, SEVERE, WARNING, INFO, FINE, FINER, FINEST, ALL
.level = INFO

# Log de Jason
jason.level = INFO

# Log del entorno
warehouse.level = INFO

# Formato de salida
java.util.logging.ConsoleHandler.level = ALL
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter
java.util.logging.SimpleFormatter.format=[%1$tF %1$tT] [%4$s] %5$s %n

# Deshabilitar algunos logs verbosos durante desarrollo
# Descomentar las siguientes líneas para reducir salida:
# jason.asSemantics.level = WARNING
# jason.asSyntax.level = WARNING
# jason.bb.level = WARNING
